<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test civique préparation</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Conteneur vide : chaque écran (cadrage, détective, retour, révélation) le remplit tour à tour. -->
  <div id="conteneur-ecrans"></div>

  <script src="js/donnees.js"></script>
  <script src="js/etat.js"></script>
  <script src="js/moteur.js"></script>
  <script src="js/ordonnanceur.js"></script>
  <script src="js/jeux/detective.js"></script>

  <script>
    // Script principal — sert une session complète, item après item, jusqu'à l'écran de
    // clôture (sections 2.1, 2.2, 5.1, 5.3 et 7.4 de SPECIFICATION.md). N'invente aucun
    // contenu pédagogique : tout provient des fichiers JSON de /data.
    // Modulation par nature (2.2) : seules les boucles 1 (ancrage) et 2 (sens) sont codées
    // ici ; aucune boucle 3 (discrimination) n'existe encore, donc ce cycle ne suppose
    // jamais l'existence de contre_exemples ni de notions_voisines — propres aux
    // "concept_a_frontieres" et absents d'un "fait_arbitraire" comme DEVISE_01.

    // État de la session en cours — un seul module de script, donc des variables de portée
    // fichier plutôt qu'un objet passé de fonction en fonction à chaque écran.
    let session = [];
    let indexItemCourant = 0;
    let situationsSession = [];
    let notionsReussies = new Set(); // ids des notions répondues correctement pendant la session
    let debutSession = null;

    /**
     * Construit un séparateur visuel entre deux blocs de l'écran de révélation.
     * @returns {HTMLElement}
     */
    function creerSeparateurRevelation() {
      const separateur = document.createElement("hr");
      separateur.className = "revelation-separateur";
      return separateur;
    }

    /**
     * Affiche l'écran de cadrage factuel, obligatoire avant tout quand la charge affective
     * de la situation est haute (règle R5, section 4.1 ; règle de validation, section 1.3).
     * @param {Object} notion
     * @param {HTMLElement} conteneur
     * @param {Function} auContinuer - Appelée quand l'apprenant clique sur "Continuer".
     */
    function afficherCadrage(notion, conteneur, auContinuer) {
      window.scrollTo(0, 0);
      conteneur.textContent = "";
      conteneur.className = "ecran-microjeu ecran-cadrage";

      const texte = document.createElement("p");
      texte.className = "cadrage-texte";
      texte.textContent = notion.cadrage_factuel;
      conteneur.appendChild(texte);

      const bouton = document.createElement("button");
      bouton.type = "button";
      bouton.className = "cadrage-bouton-continuer";
      bouton.textContent = "Continuer";
      bouton.addEventListener("click", auContinuer);
      conteneur.appendChild(bouton);
    }

    /**
     * Affiche, sur l'écran du Détective déjà construit, la formulation simplifiée demandée
     * via "Je ne comprends pas la question" (section 5.1). N'est jamais un échec : n'affecte
     * ni l'état ni l'espacement, seulement incomprehensions (géré par enregistrerIncomprehension).
     * @param {Object} notion
     * @param {HTMLElement} conteneur
     */
    function afficherFormulationSimplifiee(notion, conteneur) {
      if (conteneur.querySelector(".detective-formulation-simplifiee")) {
        return; // déjà affichée : un second clic ne la duplique pas
      }

      const question = conteneur.querySelector(".detective-question");
      const formulation = document.createElement("p");
      formulation.className = "detective-formulation-simplifiee";
      formulation.textContent = notion.formulation_simplifiee;
      question.insertAdjacentElement("afterend", formulation);
    }

    /**
     * Affiche le retour après réponse (explication_courte ou feedback_erreur, section 1.4),
     * avec un bouton "Continuer" qui mène à l'écran de révélation.
     * @param {Object} notion
     * @param {Object} angle
     * @param {boolean} reussite
     * @param {HTMLElement} conteneur
     */
    function afficherRetour(notion, angle, reussite, conteneur) {
      window.scrollTo(0, 0);
      const texte = retourApresReponse(angle, reussite);
      if (!texte) {
        console.error("Impossible d'afficher le retour : le texte attendu est manquant dans l'angle.");
        return;
      }

      conteneur.textContent = "";
      conteneur.className = "ecran-microjeu ecran-retour";

      const paragraphe = document.createElement("p");
      paragraphe.className = "retour-texte";
      paragraphe.textContent = texte;
      conteneur.appendChild(paragraphe);

      const bouton = document.createElement("button");
      bouton.type = "button";
      bouton.className = "retour-bouton-continuer";
      bouton.textContent = "Continuer";
      bouton.addEventListener("click", () => afficherRevelation(notion, conteneur));
      conteneur.appendChild(bouton);
    }

    /**
     * Affiche l'écran de révélation (boucle 2), dans l'ordre STRICT et non négociable
     * de la section 7.3 : pourquoi → nom → définition simple → définition officielle.
     * C'est ici, et seulement ici, que le nom de la notion apparaît.
     * @param {Object} notion
     * @param {HTMLElement} conteneur
     */
    function afficherRevelation(notion, conteneur) {
      window.scrollTo(0, 0);
      conteneur.textContent = "";
      conteneur.className = "ecran-microjeu ecran-revelation";

      // 1er — la fonction, jamais la définition (règle du champ pivot, section 1.2)
      const titrePourquoi = document.createElement("p");
      titrePourquoi.className = "revelation-titre";
      titrePourquoi.textContent = "Pourquoi cette règle existe ?";
      conteneur.appendChild(titrePourquoi);

      const textePourquoi = document.createElement("p");
      textePourquoi.className = "revelation-pourquoi";
      textePourquoi.textContent = notion.pourquoi_ca_existe;
      conteneur.appendChild(textePourquoi);

      conteneur.appendChild(creerSeparateurRevelation());

      // 2e — nomination explicite : le mot apparaît ici, jamais avant (principe 4, section 0)
      const nomination = document.createElement("p");
      nomination.className = "revelation-nomination";
      nomination.textContent = "Ce principe s'appelle ";
      // notion.nom_affiche est accentué et en minuscules (section 1.2) : la majuscule est
      // purement visuelle, appliquée par CSS (.revelation-nomination strong), pour ne
      // jamais perdre les accents.
      const nom = document.createElement("strong");
      nom.textContent = notion.nom_affiche;
      nomination.appendChild(nom);
      conteneur.appendChild(nomination);

      conteneur.appendChild(creerSeparateurRevelation());

      // 3e — définition simple
      const labelSimple = document.createElement("p");
      labelSimple.className = "revelation-label";
      labelSimple.textContent = "En français simple :";
      conteneur.appendChild(labelSimple);

      const defSimple = document.createElement("p");
      defSimple.className = "revelation-definition-simple";
      defSimple.textContent = notion.definition_simple;
      conteneur.appendChild(defSimple);

      // 4e — définition officielle, affichée à côté, jamais à la place
      const labelOfficielle = document.createElement("p");
      labelOfficielle.className = "revelation-label";
      labelOfficielle.textContent = "Dans le texte officiel :";
      conteneur.appendChild(labelOfficielle);

      const defOfficielle = document.createElement("p");
      defOfficielle.className = "revelation-definition-officielle";
      defOfficielle.textContent = notion.definition_officielle;
      conteneur.appendChild(defOfficielle);

      // Fin de l'item : passe au suivant, ou à l'écran de clôture si c'était le dernier
      // (section 5.3 : la session ne s'arrête jamais sur un simple "Terminer" intermédiaire).
      const bouton = document.createElement("button");
      bouton.type = "button";
      bouton.className = "revelation-bouton-continuer";
      bouton.textContent = "Continuer";
      bouton.addEventListener("click", () => passerAuItemSuivant(conteneur));
      conteneur.appendChild(bouton);
    }

    /**
     * Fabrique l'item et affiche le micro-jeu Détective (boucle 1 — ancrage).
     * @param {Object} notion
     * @param {Object} situation
     * @param {Object} angle
     * @param {HTMLElement} conteneur
     */
    function demarrerDetective(notion, situation, angle, conteneur) {
      const item = fabriquerItem(angle, situation, "detective");
      if (!item) {
        console.error("Impossible de fabriquer l'item : voir les détails ci-dessus.");
        return;
      }

      afficherDetective(notion, item, conteneur, {
        onReponse: (porte, reussite, tempsEnMs) => {
          // temps_reponse_moyen (section 1.6) est exprimé en secondes.
          enregistrerReponse(notion.id, porte, reussite, tempsEnMs / 1000);

          // Acquis de la session (section 7.4) : une notion répondue correctement au moins
          // une fois, indépendamment du critère d'acquisition pluri-jours de la section 1.7.
          if (reussite) {
            notionsReussies.add(notion.id);
          }

          afficherRetour(notion, angle, reussite, conteneur);
        },
        onIncomprehension: () => {
          enregistrerIncomprehension(notion.id);
          afficherFormulationSimplifiee(notion, conteneur);
        },
      });
    }

    /**
     * Sert l'item courant de la session : cadrage si besoin, puis micro-jeu Détective.
     * Quand tous les items ont été servis, affiche l'écran de clôture (section 7.4).
     * @param {HTMLElement} conteneur
     */
    function servirItemCourant(conteneur) {
      if (indexItemCourant >= session.length) {
        afficherCloture(conteneur);
        return;
      }

      const { notion, angle } = session[indexItemCourant];
      const situation = situationsSession.find((s) => s.id === angle.situation);

      if (!situation) {
        console.error(`Situation introuvable pour l'angle "${angle.id}" (id "${angle.situation}") : item écarté.`);
        passerAuItemSuivant(conteneur);
        return;
      }

      // Cadrage factuel avant tout si la charge affective de la situation est haute (R5, section 4.1)
      if (situation.charge_affective === "haute") {
        afficherCadrage(notion, conteneur, () => demarrerDetective(notion, situation, angle, conteneur));
      } else {
        demarrerDetective(notion, situation, angle, conteneur);
      }
    }

    /**
     * Avance à l'item suivant de la session et le sert (ou affiche la clôture s'il n'y en a plus).
     * @param {HTMLElement} conteneur
     */
    function passerAuItemSuivant(conteneur) {
      indexItemCourant += 1;
      servirItemCourant(conteneur);
    }

    /**
     * Affiche l'écran de clôture (section 7.4) : durée de la session et liste nommée des
     * acquis, un acquis par notion répondue correctement au moins une fois. Formellement
     * interdits ici (sections 5.6 et 7.4) : score, pourcentage, félicitation, badge.
     * @param {HTMLElement} conteneur
     */
    function afficherCloture(conteneur) {
      window.scrollTo(0, 0);
      conteneur.textContent = "";
      conteneur.className = "ecran-microjeu ecran-cloture";

      const dureeEnMinutes = Math.round((Date.now() - debutSession) / 60000);

      const titre = document.createElement("p");
      titre.className = "cloture-titre";
      titre.textContent = `Session terminée · ${dureeEnMinutes} minute${dureeEnMinutes === 1 ? "" : "s"}`;
      conteneur.appendChild(titre);

      const sousTitre = document.createElement("p");
      sousTitre.className = "cloture-sous-titre";
      sousTitre.textContent = "Aujourd'hui, vous savez :";
      conteneur.appendChild(sousTitre);

      const listeAcquis = document.createElement("ul");
      listeAcquis.className = "cloture-liste-acquis";

      // Un acquis par notion réussie, dans l'ordre de la session, sans doublon
      // (une même notion peut porter plusieurs items dans une session future).
      const nomsAffichesVus = new Set();
      session
        .map((item) => item.notion)
        .filter((notion) => notionsReussies.has(notion.id))
        .forEach((notion) => {
          if (nomsAffichesVus.has(notion.nom_affiche)) return;
          nomsAffichesVus.add(notion.nom_affiche);

          const ligne = document.createElement("li");
          ligne.className = "cloture-acquis-item";
          ligne.textContent = `✓ ${notion.nom_affiche}`;
          listeAcquis.appendChild(ligne);
        });

      conteneur.appendChild(listeAcquis);

      const bouton = document.createElement("button");
      bouton.type = "button";
      bouton.className = "cloture-bouton-terminer";
      bouton.textContent = "Terminer";
      bouton.addEventListener("click", () => afficherAccueil(conteneur));
      conteneur.appendChild(bouton);
    }

    // Noms lisibles des thématiques (section 7.1). Seules "valeurs" et "institutions" ont
    // des notions dans les données à ce jour (section 1.1) : les autres thématiques du
    // dépôt (03, 04, 05) sont des fichiers vides et n'apparaissent donc dans aucune notion.
    const NOMS_THEMATIQUES = {
      valeurs: "Valeurs de la République",
      institutions: "Institutions",
    };

    /**
     * Convertit l'identifiant technique d'une thématique en son nom lisible (section 7.1).
     * @param {string} thematique
     * @returns {string}
     */
    function nomLisibleThematique(thematique) {
      if (NOMS_THEMATIQUES[thematique]) {
        return NOMS_THEMATIQUES[thematique];
      }
      console.error(`Aucun nom lisible connu pour la thématique "${thematique}".`);
      return thematique;
    }

    /**
     * Accorde un mot au singulier ou au pluriel selon un nombre (règle française : le
     * singulier ne s'applique qu'à 1).
     * @param {number} nombre
     * @param {string} singulier
     * @param {string} pluriel
     * @returns {string}
     */
    function accorder(nombre, singulier, pluriel) {
      return nombre === 1 ? singulier : pluriel;
    }

    /**
     * Construit la série de pastilles ● (notion solide) / ○ (notion en construction) du
     * gabarit de la section 7.1, chacune dans son propre élément pour permettre la couleur
     * sémantique par pastille (vert = acquis, gris = à venir — section 6). Aucun
     * pourcentage, aucune barre de remplissage — interdits formels de la section 5.6.
     * @param {number} nombreSolides
     * @param {number} nombreTotal
     * @returns {HTMLElement} Un <span> conteneur avec une pastille par notion de la thématique.
     */
    function construirePastilles(nombreSolides, nombreTotal) {
      const conteneurPastilles = document.createElement("span");
      conteneurPastilles.className = "accueil-pastilles";

      for (let i = 0; i < nombreTotal; i += 1) {
        const estSolide = i < nombreSolides;
        const pastille = document.createElement("span");
        pastille.className = estSolide ? "accueil-pastille accueil-pastille-solide" : "accueil-pastille accueil-pastille-vide";
        pastille.textContent = estSolide ? "●" : "○";
        conteneurPastilles.appendChild(pastille);
      }

      return conteneurPastilles;
    }

    /**
     * Charge toutes les notions actuellement disponibles dans les données (section 1.1).
     * Factorisé pour que l'écran d'accueil et la session jouée voient exactement les mêmes
     * données et affichent donc le même nombre d'items.
     * @returns {Promise<Array>} Le tableau de toutes les notions chargées.
     */
    async function chargerNotionsDisponibles() {
      const notionsValeurs = await chargerNotions("01-valeurs.json");
      const notionsInstitutions = await chargerNotions("02-institutions.json");
      return notionsValeurs.concat(notionsInstitutions);
    }

    /**
     * Indique si l'apprenant a déjà répondu à au moins une question, tous thèmes
     * confondus : détermine le libellé "Commencer" / "Continuer" du bouton principal
     * de l'écran d'accueil (section 7.1).
     * @returns {boolean}
     */
    function aDejaCommence() {
      const tousLesEtats = litTousLesEtats();
      return Object.values(tousLesEtats).some(
        (etat) => Array.isArray(etat.moments_espaces) && etat.moments_espaces.length > 0
      );
    }

    /**
     * Regroupe les notions par thématique, dans leur ordre d'apparition dans les données,
     * et calcule pour chacune son nombre de notions à l'état "solide" (critère
     * d'acquisition de la section 1.7, via calculerEtat de /js/etat.js).
     * @param {Array<Object>} notions
     * @returns {Array<{thematique: string, notions: Array<Object>, nombreSolides: number}>}
     */
    function resumerThematiques(notions) {
      const ordre = [];
      const groupes = {};

      notions.forEach((notion) => {
        if (!groupes[notion.thematique]) {
          groupes[notion.thematique] = [];
          ordre.push(notion.thematique);
        }
        groupes[notion.thematique].push(notion);
      });

      return ordre.map((thematique) => {
        const notionsThematique = groupes[thematique];
        const nombreSolides = notionsThematique.filter((notion) => {
          const etat = chargerEtat(notion.id);
          return calculerEtat(etat, notion.nature) === "solide";
        }).length;

        return { thematique, notions: notionsThematique, nombreSolides };
      });
    }

    /**
     * Affiche l'écran d'accueil (section 7.1), point d'entrée avant toute session : titre,
     * bouton principal vers la session à venir, puis "Ce que je sais faire" — la
     * progression en capacités de la section 5.2. Formellement interdits ici (section
     * 5.6) : tout pourcentage, toute barre de remplissage, tout cadenas, toute catégorie
     * de niveau nommée.
     * @param {HTMLElement} conteneur
     */
    async function afficherAccueil(conteneur) {
      window.scrollTo(0, 0);
      conteneur.textContent = "";
      conteneur.className = "ecran-microjeu ecran-accueil";

      const notions = await chargerNotionsDisponibles();
      const angles = await chargerAngles();
      const sessionAVenir = construireSession(notions, angles, {});
      const nombreItems = sessionAVenir.length;

      const titre = document.createElement("p");
      titre.className = "accueil-titre";
      titre.textContent = "Ma préparation";
      conteneur.appendChild(titre);

      const boutonPrincipal = document.createElement("button");
      boutonPrincipal.type = "button";
      boutonPrincipal.className = "accueil-bouton-principal";

      const label = document.createElement("span");
      label.className = "accueil-bouton-principal-label";
      label.textContent = aDejaCommence() ? "Continuer" : "Commencer";
      boutonPrincipal.appendChild(label);

      const details = document.createElement("span");
      details.className = "accueil-bouton-principal-details";
      details.textContent =
        `${nombreItems} ${accorder(nombreItems, "item", "items")} · ` +
        `environ ${nombreItems} ${accorder(nombreItems, "minute", "minutes")}`;
      boutonPrincipal.appendChild(details);

      boutonPrincipal.addEventListener("click", () => demarrerSession(conteneur));
      conteneur.appendChild(boutonPrincipal);

      const separateur = document.createElement("hr");
      separateur.className = "accueil-separateur";
      conteneur.appendChild(separateur);

      const sectionSavoirFaire = document.createElement("div");
      sectionSavoirFaire.className = "accueil-savoir-faire";

      const titreSavoirFaire = document.createElement("p");
      titreSavoirFaire.className = "accueil-savoir-faire-titre";
      titreSavoirFaire.textContent = "Ce que je sais faire";
      sectionSavoirFaire.appendChild(titreSavoirFaire);

      resumerThematiques(notions).forEach(({ thematique, notions: notionsThematique, nombreSolides }) => {
        const blocThematique = document.createElement("div");
        blocThematique.className = "accueil-thematique";

        const nom = document.createElement("p");
        nom.className = "accueil-thematique-nom";
        nom.textContent = nomLisibleThematique(thematique);
        blocThematique.appendChild(nom);

        const ligne = document.createElement("p");
        ligne.className = "accueil-thematique-ligne";

        ligne.appendChild(construirePastilles(nombreSolides, notionsThematique.length));

        const compte = document.createElement("span");
        compte.className = "accueil-thematique-compte";
        compte.textContent = `${nombreSolides} ${accorder(nombreSolides, "notion solide", "notions solides")}`;
        ligne.appendChild(compte);

        blocThematique.appendChild(ligne);
        sectionSavoirFaire.appendChild(blocThematique);
      });

      conteneur.appendChild(sectionSavoirFaire);
    }

    /**
     * Lance une session complète : construit la session ordonnée (règles O3, O1, O4 —
     * section 4.2) et sert son premier item. Appelée depuis le bouton principal de
     * l'écran d'accueil (section 7.1).
     * @param {HTMLElement} conteneur
     */
    async function demarrerSession(conteneur) {
      // 1. Chargement des données (aucun contenu écrit en dur : tout provient des
      //    fichiers JSON de /data)
      const notions = await chargerNotionsDisponibles();
      situationsSession = await chargerSituations();
      const angles = await chargerAngles();

      // 2. Construction de la session ordonnée
      session = construireSession(notions, angles, {});
      indexItemCourant = 0;
      notionsReussies = new Set();
      debutSession = Date.now();

      if (session.length === 0) {
        console.error("Aucun item servable pour cette session (voir les règles O3/O4 de l'ordonnanceur).");
        return;
      }

      // 3. Sert le premier item
      servirItemCourant(conteneur);
    }

    afficherAccueil(document.getElementById("conteneur-ecrans"));
  </script>
</body>
</html>
